<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>AppDev Compass | Build Your App APK</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --bg: #0a0a0a; --bg2: #111111; --bg3: #1a1a1a; --bg4: #222222;
      --border: #2a2a2a; --border2: #333333;
      --text: #f0f0f0; --text2: #aaaaaa; --text3: #666666;
      --accent: #ffffff; --accent2: #cccccc;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'Space Grotesk',sans-serif; line-height:1.5; scroll-behavior:smooth; }

    /* HEADER */
    .site-header {
      background:var(--bg2); border-bottom:1px solid var(--border);
      padding:.9rem 2rem; display:flex; align-items:center;
      justify-content:space-between; position:sticky; top:0; z-index:100;
    }
    .logo-area { display:flex; align-items:center; gap:14px; }
    .logo-img {
      width:44px; height:44px; border-radius:10px; background:var(--bg4);
      border:1px solid var(--border2); display:flex; align-items:center;
      justify-content:center; overflow:hidden; flex-shrink:0;
    }
    .logo-img img { width:100%; height:100%; object-fit:cover; border-radius:9px; }
    .logo-placeholder {
      width:100%; height:100%; display:flex; align-items:center; justify-content:center;
      font-family:'Syne',sans-serif; font-weight:800; font-size:1.2rem;
      color:var(--text); background:linear-gradient(135deg,#222,#111);
    }
    .logo-text { font-family:'Syne',sans-serif; font-weight:800; font-size:1.3rem; color:var(--accent); letter-spacing:-.5px; }
    .logo-text span { color:var(--text3); font-weight:400; }

    /* WELCOME */
    .welcome-screen {
      min-height:calc(100vh - 62px); display:flex; flex-direction:column;
      align-items:center; justify-content:center; padding:2rem;
      text-align:center; background:var(--bg); position:relative; overflow:hidden;
    }
    .welcome-screen::before {
      content:''; position:absolute; inset:0;
      background:radial-gradient(ellipse 60% 40% at 50% 30%,rgba(255,255,255,.03) 0%,transparent 70%);
      pointer-events:none;
    }
    .welcome-logo {
      width:90px; height:90px; border-radius:22px; background:var(--bg3);
      border:1px solid var(--border2); display:flex; align-items:center;
      justify-content:center; margin:0 auto 1.5rem; overflow:hidden;
    }
    .welcome-logo img { width:100%; height:100%; object-fit:cover; border-radius:20px; }
    .wl-placeholder { font-family:'Syne',sans-serif; font-weight:800; font-size:2rem; color:var(--text); }
    .welcome-screen h1 {
      font-family:'Syne',sans-serif; font-size:clamp(2rem,5vw,3.2rem);
      font-weight:800; color:var(--accent); letter-spacing:-1px; margin-bottom:.8rem;
    }
    .welcome-screen .subtitle { font-size:1.05rem; color:var(--text2); max-width:560px; margin:0 auto 2rem; line-height:1.7; }
    .welcome-badges { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:2.5rem; }
    .badge {
      background:var(--bg3); border:1px solid var(--border2); border-radius:6px;
      padding:4px 12px; font-size:.75rem; font-weight:600; color:var(--text2);
      letter-spacing:.5px; text-transform:uppercase;
    }
    .start-btn {
      background:var(--accent); color:#000; border:none; padding:14px 40px;
      border-radius:8px; font-family:'Syne',sans-serif; font-weight:700; font-size:1rem;
      cursor:pointer; transition:.2s; letter-spacing:.3px;
      display:inline-flex; align-items:center; gap:10px;
    }
    .start-btn:hover { background:#ddd; transform:translateY(-1px); }
    .welcome-note { margin-top:1.5rem; font-size:.8rem; color:var(--text3); }

    /* MAIN APP */
    .app-screen { display:none; }
    .app-screen.visible { display:block; }
    .welcome-screen.hidden { display:none; }
    .container { max-width:1400px; margin:0 auto; padding:1.5rem 2rem; }
    .dashboard { display:flex; gap:2rem; flex-wrap:wrap; }
    .sidebar {
      flex:1; min-width:260px; max-width:300px;
      position:sticky; top:76px; max-height:calc(100vh - 100px);
      overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border2) transparent;
    }
    .sidebar::-webkit-scrollbar { width:4px; }
    .sidebar::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }
    .content-area { flex:3; min-width:280px; }

    .sidebar-label {
      font-size:.7rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
      color:var(--text3); margin-bottom:1rem; padding-bottom:.5rem; border-bottom:1px solid var(--border);
    }
    .guide-category {
      background:var(--bg2); border-radius:10px; padding:1rem; margin-bottom:8px;
      border:1px solid var(--border); cursor:pointer; transition:all .18s; position:relative;
    }
    .guide-category.active { border-color:var(--accent2); background:var(--bg3); }
    .guide-category:hover:not(.active) { background:var(--bg3); border-color:var(--border2); }
    .guide-category h3 {
      font-size:.9rem; font-weight:600; display:flex; align-items:center;
      gap:10px; margin-bottom:4px; color:var(--text);
    }
    .guide-category h3 i { color:var(--text2); width:16px; font-size:.85rem; }
    .guide-category p { color:var(--text3); font-size:.78rem; line-height:1.4; }
    .step-count { font-size:.7rem; color:var(--text3); margin-top:5px; display:inline-flex; align-items:center; gap:4px; }

    .guide-viewer { background:var(--bg2); border-radius:16px; padding:1.8rem; border:1px solid var(--border); }
    .guide-header { margin-bottom:1.2rem; padding-bottom:1rem; border-bottom:1px solid var(--border); }
    .guide-header h2 {
      font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:700;
      display:flex; align-items:center; gap:10px; color:var(--accent);
    }
    .guide-header h2 i { color:var(--text3); font-size:1.1rem; }
    .step-progress {
      display:flex; justify-content:space-between; align-items:center;
      margin:1rem 0 1.5rem; flex-wrap:wrap; gap:10px;
    }
    .step-indicator {
      background:var(--bg3); border:1px solid var(--border2);
      padding:5px 14px; border-radius:6px; font-size:.8rem; font-weight:600; color:var(--text2);
    }
    .nav-buttons { display:flex; gap:8px; }
    .nav-btn {
      background:var(--bg3); border:1px solid var(--border2); color:var(--text);
      padding:6px 16px; border-radius:6px; font-weight:600; font-size:.82rem;
      cursor:pointer; transition:.15s; font-family:'Space Grotesk',sans-serif;
      display:inline-flex; align-items:center; gap:6px;
    }
    .nav-btn:hover:not(:disabled) { background:var(--bg4); border-color:var(--accent2); }
    .nav-btn:disabled { opacity:.3; cursor:not-allowed; }
    .step-card {
      background:var(--bg); border-radius:12px; padding:1.5rem;
      margin:1.2rem 0; border-left:3px solid var(--text3);
    }
    .step-title { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:700; margin-bottom:.8rem; color:var(--accent); }
    .step-desc { font-size:.95rem; color:var(--text2); margin-bottom:.8rem; line-height:1.65; }
    pre {
      background:#050505; padding:1rem; border-radius:10px; overflow-x:auto;
      font-family:'Courier New',monospace; font-size:.82rem;
      border:1px solid var(--border); margin:.8rem 0; color:#cccccc;
    }
    .note-box {
      background:#1c1c14; border-left:3px solid #888; padding:.85rem 1rem;
      border-radius:8px; margin:.8rem 0; font-size:.88rem; color:var(--text2);
    }
    .warning-box {
      background:#1e1414; border-left:3px solid #666; padding:.85rem 1rem;
      border-radius:8px; margin:.8rem 0; font-size:.88rem; color:var(--text2);
    }
    hr { border:none; border-top:1px solid var(--border); margin:1rem 0; }
    .copy-btn {
      background:var(--bg3); border:1px solid var(--border2); color:var(--text2);
      padding:4px 12px; border-radius:5px; font-size:.72rem; cursor:pointer;
      margin-bottom:6px; display:inline-flex; align-items:center; gap:5px;
      font-family:'Space Grotesk',sans-serif;
    }
    .copy-btn:hover { background:var(--bg4); color:var(--text); }
    .code-header { display:flex; justify-content:flex-end; margin-bottom:-4px; }
    .step-footer { font-size:.78rem; color:var(--text3); display:flex; justify-content:space-between; margin-top:1rem; }

    /* FOOTER */
    footer {
      margin-top:3rem; border-top:1px solid var(--border); padding:1.5rem 2rem;
      display:flex; align-items:center; justify-content:center; gap:1rem; flex-wrap:wrap;
    }
    .fb-link {
      display:inline-flex; align-items:center; gap:8px; background:var(--bg3);
      border:1px solid var(--border2); color:var(--text2); padding:8px 18px;
      border-radius:8px; text-decoration:none; font-weight:600; font-size:.85rem; transition:.2s;
    }
    .fb-link:hover { background:var(--bg4); color:var(--text); border-color:#555; }
    .fb-link i { color:#888; font-size:1rem; }
    .footer-text { font-size:.78rem; color:var(--text3); }

    /* MODAL */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.85);
      backdrop-filter:blur(6px); z-index:999;
      display:flex; align-items:center; justify-content:center; padding:1.5rem;
      opacity:0; pointer-events:none; transition:opacity .22s ease;
    }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal-box {
      background:var(--bg2); border:1px solid var(--border2); border-radius:18px;
      width:100%; max-width:700px; max-height:88vh;
      display:flex; flex-direction:column; overflow:hidden;
      transform:translateY(24px) scale(.97);
      transition:transform .25s ease, opacity .22s ease; opacity:0;
    }
    .modal-overlay.open .modal-box { transform:translateY(0) scale(1); opacity:1; }
    .modal-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:1.2rem 1.5rem; border-bottom:1px solid var(--border); flex-shrink:0;
    }
    .modal-header h2 {
      font-family:'Syne',sans-serif; font-size:1.15rem; font-weight:700;
      color:var(--accent); display:flex; align-items:center; gap:10px;
    }
    .modal-header h2 i { color:var(--text3); font-size:1rem; }
    .modal-close {
      background:var(--bg3); border:1px solid var(--border2); color:var(--text2);
      width:32px; height:32px; border-radius:6px; cursor:pointer;
      display:flex; align-items:center; justify-content:center; font-size:.85rem;
      transition:.15s; flex-shrink:0;
    }
    .modal-close:hover { background:var(--bg4); color:var(--text); }
    .modal-body {
      padding:1.5rem; overflow-y:auto; flex:1;
      scrollbar-width:thin; scrollbar-color:var(--border2) transparent;
    }
    .modal-body::-webkit-scrollbar { width:4px; }
    .modal-body::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }
    .modal-footer {
      padding:1rem 1.5rem; border-top:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
      flex-shrink:0; gap:10px; flex-wrap:wrap;
    }
    .modal-open-btn {
      background:var(--accent); color:#000; border:none; padding:7px 18px;
      border-radius:6px; font-family:'Space Grotesk',sans-serif; font-weight:700;
      font-size:.82rem; cursor:pointer; transition:.15s;
      display:inline-flex; align-items:center; gap:6px;
    }
    .modal-open-btn:hover { background:#ddd; }

    @media (max-width:800px) {
      .container { padding:1rem; }
      .dashboard { flex-direction:column; }
      .sidebar { position:static; max-height:none; max-width:100%; }
      .site-header { padding:.7rem 1rem; }
      .logo-text { font-size:1rem; }
      .modal-box { max-height:93vh; border-radius:14px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="logo-area">
    <div class="logo-img">
      <img src="logo.png" alt="Logo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
      <div class="logo-placeholder" style="display:none;">AC</div>
    </div>
    <div class="logo-text">AppDev<span> Compass</span></div>
  </div>
</header>

<!-- WELCOME -->
<div class="welcome-screen" id="welcome-screen">
  <div class="welcome-logo">
    <img src="logo.png" alt="Logo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
    <div class="wl-placeholder" style="display:none;">AC</div>
  </div>
  <h1>AppDev Compass</h1>
  <div class="welcome-badges">
    <span class="badge"><i class="fas fa-android"></i> Android APK</span>
    <span class="badge"><i class="fas fa-fire"></i> Firebase</span>
    <span class="badge"><i class="fas fa-box"></i> EAS Build</span>
    <span class="badge"><i class="fas fa-cloud"></i> Cloudinary</span>
  </div>
  <button class="start-btn" onclick="startApp()">
    <i class="fas fa-play"></i> Start Learning
  </button>
  <p class="welcome-note">Free tutorial — no account required</p>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <h2><i id="modal-icon" class="fas fa-circle"></i> <span id="modal-title"></span></h2>
      <button class="modal-close" id="modal-close-btn"><i class="fas fa-xmark"></i></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <div class="nav-buttons">
        <button id="modal-prev-btn" class="nav-btn"><i class="fas fa-chevron-left"></i> Previous</button>
        <button id="modal-next-btn" class="nav-btn">Next <i class="fas fa-chevron-right"></i></button>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="step-indicator" id="modal-step-ind"></span>
        <button class="modal-open-btn" id="modal-open-full-btn"><i class="fas fa-expand"></i> Open Full Guide</button>
      </div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div class="app-screen" id="app-screen">
  <div class="container">
    <div class="dashboard">
      <div class="sidebar" id="guide-sidebar"></div>
      <div class="content-area">
        <div class="guide-viewer">
          <div class="guide-header">
            <h2><i class="fas fa-compass" id="guide-icon"></i> <span id="current-guide-title">Select a guide</span></h2>
          </div>
          <div id="step-content">
            <div style="text-align:center;padding:3rem 1rem;color:var(--text3);">
              <i class="fas fa-hand-point-left fa-2x"></i>
              <p style="margin-top:1rem;">Click any guide from the left panel to start.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <footer>
    <span class="footer-text">If you have any questions:</span>
    <a href="https://www.facebook.com/johnfhilip.parilla/" target="_blank" class="fb-link">
      <i class="fab fa-facebook-messenger"></i> Message me on Facebook
    </a>
  </footer>
</div>

<script>
const GUIDES = {
  expo_setup: {
    id: "expo_setup",
    title: "1. Create Expo Project",
    icon: "fa-mobile-screen-button",
    description: "Initialize Expo React Native app, run on device, folder structure",
    steps: [
      {
        step: "Open Terminal / CMD",
        desc: "Open your terminal or command prompt on your computer."
      },
      {
        step: "Create Project",
        code: "npx create-expo-app MyApp",
        desc: "Creates your React Native Expo project. Replace 'MyApp' with your actual app name."
      },
      {
        step: "Wait for Installation",
        desc: "After installation completes, your project folder is ready with all default dependencies."
      },
      {
        step: "Go to Project Folder",
        code: "cd MyApp",
        desc: "Navigate into your project directory before running any further commands."
      },
      {
        step: "Run Your App (LAN Mode)",
        desc: "Starts the development server. Scan the QR code with the Expo Go app on your Android phone.",
        note: "Both your phone and laptop must be on the same WiFi. Update the IP address to match your machine's local IP (run 'ipconfig' on Windows or 'ifconfig' on Mac/Linux to find it).",
        code: `# Simple start — try this first:
npx expo start --lan

# If the QR code doesn't connect, use your machine's local IP:
EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0 REACT_NATIVE_PACKAGER_HOSTNAME=192.168.100.160 npx expo start --lan

# Replace 192.168.100.160 with YOUR actual local IP address`
      },
      {
        step: "Connect Mobile Device",
        desc: "Open Expo Go on your Android phone and scan the QR code shown in the terminal.",
        note: "Both devices must be connected to the same WiFi network."
      },
      {
        step: "Edit Your Project",
        desc: "Go to root folder → app/ → (tabs) to edit your screens. Create an (auth) folder for login and register pages."
      },
      {
        step: "Important Warning",
        desc: "These layout files are required for Expo Router routing — deleting them will break navigation.",
        note: "DO NOT DELETE _layout.tsx inside root/app/(tabs) or root/app/(auth)"
      }
    ]
  },
  install_packages: {
    id: "install_packages",
    title: "2. Install Dependencies",
    icon: "fa-cube",
    description: "Firebase, Axios, Image Picker, and essential packages",
    steps: [
      { step: "Install Firebase", code: "npm install firebase", desc: "Firebase SDK for authentication and Firestore database." },
      { step: "Install Axios", code: "npm install axios", desc: "HTTP client for making API calls to Cloudinary and other services." },
      { step: "Install Image Picker", code: "npm install expo-image-picker", desc: "Allows users to pick images from their gallery or take photos with the camera." },
      { step: "Install Safe Area Context", code: "npm install react-native-safe-area-context", desc: "Handles device notches and status bars so content isn't hidden." },
      { step: "Install Async Storage", code: "npm install @react-native-async-storage/async-storage", desc: "Persists local data and auth tokens between app sessions." },
      { step: "Verify All Packages", code: "npx expo install --check", desc: "Checks that all installed packages are compatible with your current Expo SDK version." }
    ]
  },
  firebase_setup: {
    id: "firebase_setup",
    title: "3. Firebase Core Setup",
    icon: "fa-fire",
    description: "API config, authentication, Firestore database",
    steps: [
      {
        step: "Get Firebase Config",
        desc: "Go to console.firebase.google.com → Create a new project → Project Settings → Add a web app (</>). Copy the firebaseConfig object shown."
      },
      {
        step: "Create Config File",
        code: "mkdir config && touch config/firebase.js",
        desc: "Create a config folder and a firebase.js file inside it, then paste your config."
      },
      {
        step: "Firebase Initialization Code",
        code: `import { initializeApp } from "firebase/app";
import { getAuth } from "firebase/auth";
import { getFirestore } from "firebase/firestore";
import { getStorage } from "firebase/storage";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "SENDER_ID",
  appId: "APP_ID"
};

const app = initializeApp(firebaseConfig);
export const auth = getAuth(app);
export const db = getFirestore(app);
export const storage = getStorage(app);`,
        desc: "Replace all placeholder values with your actual Firebase project credentials."
      },
      {
        step: "Enable Email/Password Auth",
        desc: "Firebase Console → Authentication → Get Started → Sign-in method → Enable Email/Password → Save."
      },
      {
        step: "Create Firestore Database",
        desc: "Firebase Console → Firestore Database → Create Database → Start in Test Mode → Choose your nearest region → Done."
      },
      {
        step: "Fix Index Errors",
        desc: "If your app shows an 'index required' error, click the link in that error message. Firebase will open and build the required composite index automatically."
      }
    ]
  },
  cloudinary_setup: {
    id: "cloudinary_setup",
    title: "4. Cloudinary + Image Upload",
    icon: "fa-cloud-upload-alt",
    description: "Image upload API, FormData, store URL in Firestore",
    steps: [
      { step: "Create Cloudinary Account", desc: "Go to cloudinary.com → Sign up for free → Go to your Dashboard." },
      { step: "Copy Your Credentials", desc: "From the Dashboard, note your Cloud Name. You'll need it in the upload URL." },
      {
        step: "Create an Upload Preset",
        desc: "Settings → Upload tab → Add upload preset → Set to Unsigned mode → Name it 'app_uploads' → Save."
      },
      {
        step: "Image Upload Function",
        code: `const uploadToCloudinary = async (imageUri) => {
  const formData = new FormData();
  formData.append('file', {
    uri: imageUri,
    name: 'photo.jpg',
    type: 'image/jpeg'
  });
  formData.append('upload_preset', 'app_uploads');

  const response = await fetch(
    'https://api.cloudinary.com/v1_1/YOUR_CLOUD_NAME/image/upload',
    { method: 'POST', body: formData }
  );
  const data = await response.json();
  return data.secure_url; // Save this URL to Firestore
};`,
        desc: "Call this function with the image URI, then save the returned URL to your Firestore document."
      }
    ]
  },
  auth_navigation: {
    id: "auth_navigation",
    title: "5. Login / Register + Navigation",
    icon: "fa-key",
    description: "Expo Router auth flow, Firebase signIn, protected routes",
    steps: [
      {
        step: "Create Auth Screens",
        desc: "Inside app/(auth)/ create login.jsx and register.jsx. Each should have email and password inputs."
      },
      {
        step: "Firebase Auth Functions",
        code: `import { signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "firebase/auth";
import { auth } from "../config/firebase";

export const loginUser = (email, password) =>
  signInWithEmailAndPassword(auth, email, password);

export const registerUser = (email, password) =>
  createUserWithEmailAndPassword(auth, email, password);

export const logoutUser = () => signOut(auth);`,
        desc: "Export these functions from a helper file and import them in your login/register screens."
      },
      {
        step: "Protect Routes with AuthContext",
        desc: "Create an AuthContext that uses onAuthStateChanged. If a user is logged in, route to /(tabs). Otherwise redirect to /(auth)/login."
      },
      {
        step: "Add Input Validation",
        desc: "Check email format with a regex and enforce a minimum password length of 6 characters before calling Firebase auth methods."
      },
      {
        step: "Show Loading States",

// ---- STATE ----
let activeGuideId = null;
let currentStepIndex = 0;
let currentGuideData = null;
let modalGuideData = null;
let modalStepIndex = 0;

// ---- HELPERS ----
function esc(str) {
  if (!str) return "";
  return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
}
function escAttr(str) {
  if (!str) return "";
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildStepHtml(step, index) {
  const descHtml  = step.desc    ? `<div class="step-desc">${esc(step.desc)}</div>` : "";
  const noteHtml  = step.note    ? `<div class="note-box"><i class="fas fa-info-circle"></i> <strong>Note:</strong> ${esc(step.note)}</div>` : "";
  const warnHtml  = step.warning ? `<div class="warning-box"><i class="fas fa-exclamation-triangle"></i> <strong>Warning:</strong> ${esc(step.warning)}</div>` : "";
  const codeHtml  = step.code    ? `
    <div>
      <div class="code-header">
        <button class="copy-btn" data-copy="${escAttr(step.code)}">
          <i class="far fa-copy"></i> Copy code
        </button>
      </div>
      <pre><code>${esc(step.code)}</code></pre>
    </div>` : "";
  return `
    <div class="step-card" style="margin-top:0;">
      <div class="step-title">${index + 1}. ${esc(step.step)}</div>
      ${descHtml}${codeHtml}${noteHtml}${warnHtml}
    </div>`;
}

function attachCopyBtns(container) {
  container.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      navigator.clipboard.writeText(btn.getAttribute('data-copy'));
      const orig = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
      setTimeout(() => { btn.innerHTML = orig; }, 1500);
    });
  });
}

// ---- SIDEBAR ----
function renderSidebar() {
  const el = document.getElementById("guide-sidebar");
  let html = `<div class="sidebar-label"><i class="fas fa-map"></i> Development Journey</div>`;
  for (let key in GUIDES) {
    const g = GUIDES[key];
    html += `
      <div class="guide-category ${activeGuideId === g.id ? 'active' : ''}" data-id="${g.id}">
        <h3><i class="fas ${g.icon}"></i> ${esc(g.title)}</h3>
        <p>${esc(g.description)}</p>
        <div class="step-count"><i class="fas fa-list-ol"></i> ${g.steps.length} steps</div>
      </div>`;
  }
  el.innerHTML = html;
  el.querySelectorAll('.guide-category').forEach(card => {
    card.addEventListener('click', () => openModal(card.getAttribute('data-id')));
  });
}

// ---- FULL GUIDE VIEW ----
function loadGuide(guideId) {
  const guide = GUIDES[guideId];
  if (!guide) return;
  activeGuideId = guideId;
  currentGuideData = guide;
  currentStepIndex = 0;
  renderSidebar();
  renderCurrentStep();
}

function renderCurrentStep() {
  if (!currentGuideData) return;
  const steps = currentGuideData.steps;
  const total = steps.length;
  document.getElementById('current-guide-title').textContent = currentGuideData.title;
  document.getElementById('guide-icon').className = `fas ${currentGuideData.icon}`;
  const contentEl = document.getElementById('step-content');
  contentEl.innerHTML = `
    <div class="step-progress">
      <div class="step-indicator"><i class="fas fa-list-ol"></i> Step ${currentStepIndex + 1} of ${total}</div>
      <div class="nav-buttons">
        <button id="prev-step-btn" class="nav-btn" ${currentStepIndex === 0 ? 'disabled' : ''}>
          <i class="fas fa-chevron-left"></i> Previous
        </button>
        <button id="next-step-btn" class="nav-btn" ${currentStepIndex === total - 1 ? 'disabled' : ''}>
          Next <i class="fas fa-chevron-right"></i>
        </button>
      </div>
    </div>
    ${buildStepHtml(steps[currentStepIndex], currentStepIndex)}
    <hr>
    <div class="step-footer">
      <span><i class="fas fa-check-circle"></i> Follow step-by-step</span>
      <span><i class="fas fa-code-branch"></i> AppDev Compass</span>
    </div>`;
  attachCopyBtns(contentEl);
  document.getElementById('prev-step-btn').addEventListener('click', () => changeStep(-1));
  document.getElementById('next-step-btn').addEventListener('click', () => changeStep(1));
}

function changeStep(delta) {
  if (!currentGuideData) return;
  const n = currentStepIndex + delta;
  if (n >= 0 && n < currentGuideData.steps.length) { currentStepIndex = n; renderCurrentStep(); }
}

// ---- MODAL ----
function openModal(guideId) {
  const guide = GUIDES[guideId];
  if (!guide) return;
  modalGuideData = guide;
  modalStepIndex = 0;
  renderModalStep();
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function renderModalStep() {
  if (!modalGuideData) return;
  const steps = modalGuideData.steps;
  const total = steps.length;
  document.getElementById('modal-icon').className = `fas ${modalGuideData.icon}`;
  document.getElementById('modal-title').textContent = modalGuideData.title;
  document.getElementById('modal-step-ind').innerHTML = `<i class="fas fa-list-ol"></i> Step ${modalStepIndex + 1} of ${total}`;
  document.getElementById('modal-prev-btn').disabled = modalStepIndex === 0;
  document.getElementById('modal-next-btn').disabled = modalStepIndex === total - 1;
  const bodyEl = document.getElementById('modal-body');
  bodyEl.innerHTML = buildStepHtml(steps[modalStepIndex], modalStepIndex);
  attachCopyBtns(bodyEl);
}

// ---- INIT ----
function startApp() {
  document.getElementById('welcome-screen').classList.add('hidden');
  document.getElementById('app-screen').classList.add('visible');
  renderSidebar();
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('modal-close-btn').addEventListener('click', closeModal);

  document.getElementById('modal-open-full-btn').addEventListener('click', () => {
    if (!modalGuideData) return;
    const id = modalGuideData.id;
    closeModal();
    document.getElementById('welcome-screen').classList.add('hidden');
    document.getElementById('app-screen').classList.add('visible');
    loadGuide(id);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  document.getElementById('modal-prev-btn').addEventListener('click', () => {
    if (modalStepIndex > 0) { modalStepIndex--; renderModalStep(); }
  });

  document.getElementById('modal-next-btn').addEventListener('click', () => {
    if (modalGuideData && modalStepIndex < modalGuideData.steps.length - 1) {
      modalStepIndex++; renderModalStep();
    }
  });

  // Close on overlay click
  document.getElementById('modal-overlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });

  // Keyboard: Escape = close, Arrow keys = navigate steps
  document.addEventListener('keydown', (e) => {
    const isOpen = document.getElementById('modal-overlay').classList.contains('open');
    if (e.key === 'Escape') closeModal();
    if (isOpen && e.key === 'ArrowRight' && modalGuideData && modalStepIndex < modalGuideData.steps.length - 1) {
      modalStepIndex++; renderModalStep();
    }
    if (isOpen && e.key === 'ArrowLeft' && modalStepIndex > 0) {
      modalStepIndex--; renderModalStep();
    }
  });
});
</script>
